<!DOCTYPE html>
<html>

<head>

<title>Contact</title>

<link rel="stylesheet" href="portfolio.css">
<link rel="stylesheet" href="contact.css">

</head>


<body>


<header>

<h2>Student Portfolio</h2>

<nav>
<a href="portfolio.html">Home</a>
<a href="about.html">About</a>
<a href="resume.html">Resume</a>
<a href="project.html">Projects</a>
<a href="contact.html">Contact</a>
</nav>

</header>



<div class="contact-container">

<div class="contact-title">
CONTACT
</div>


<div class="contact-row">

<div class="contact-label">Phone:</div>

<div class="contact-value" id="phone"></div>

</div>



<div class="contact-row">

<div class="contact-label">Email:</div>

<div class="contact-value" id="email"></div>

</div>



<div class="contact-row">

<div class="contact-label">Address:</div>

<div class="contact-value" id="address"></div>

</div>
<br>

<div class="links-title">
Links:
</div>
<br>

<div class="contact-row">

<div class="contact-label">LinkedIn:</div>

<div class="contact-value">
<a id="linkedin" target="_blank"></a>
</div>

</div>



<div class="contact-row">

<div class="contact-label">GitHub:</div>

<div class="contact-value">
<a id="github" target="_blank"></a>
</div>

</div>


</div>



<script>

document.getElementById("phone").innerText =
localStorage.getItem("phone");

document.getElementById("email").innerText =
localStorage.getItem("email");

document.getElementById("address").innerText =
localStorage.getItem("address");

let linkedin = localStorage.getItem("linkedin");
document.getElementById("linkedin").href = linkedin;
document.getElementById("linkedin").innerText = linkedin;

let github = localStorage.getItem("github");
document.getElementById("github").href = github;
document.getElementById("github").innerText = github;

</script>


</body>

</html>
