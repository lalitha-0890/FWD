<!DOCTYPE html>
<html>

<head>

<title>Resume</title>

<link rel="stylesheet" href="portfolio.css">
<link rel="stylesheet" href="resume.css">

</head>


<body>


<header>

<h2>Student Portfolio</h2>

<nav>
<a href="portfolio.html">Home</a>
<a href="about.html">About</a>
<a href="resume.html">Resume</a>
<a href="project.html">Projects</a>
<a href="contact.html">Contact</a>
</nav>

</header>



<div class="resume-container">


<!-- LEFT SECTION -->

<div class="left-section">

<img id="profilePhoto" class="profile-img">

<div class="name" id="name"></div>

<div class="role">Student</div>


<div class="section-title">CONTACT</div>

<div class="contact">

<p id="phone"></p>
<p id="email"></p>
<p id="address"></p>

</div>


<div class="section-title">SKILLS</div>

<div class="skills">

<p id="skills"></p>

</div>

</div>



<!-- RIGHT SECTION -->

<div class="right-section">


<div class="section-title">PROFILE</div>

<p class="profile-text" id="profile"></p>



<div class="section-title">EXPERIENCE</div>

<div class="experience">

<p id="experience"></p>

</div>



<div class="section-title">EDUCATION</div>

<div class="education">

<p id="eduDetails"></p>

</div>


</div>


</div>



<script>

document.getElementById("name").innerText =
localStorage.getItem("name");

document.getElementById("phone").innerText =
localStorage.getItem("phone");

document.getElementById("email").innerText =
localStorage.getItem("email");

document.getElementById("address").innerText =
localStorage.getItem("address");

document.getElementById("skills").innerText =
localStorage.getItem("skills");

document.getElementById("profile").innerText =
localStorage.getItem("profile");

document.getElementById("experience").innerText =
localStorage.getItem("experience");

document.getElementById("eduDetails").innerText =
localStorage.getItem("eduDetails");

document.getElementById("profilePhoto").src =
localStorage.getItem("photo");

</script>


</body>

</html>
